# tmux config — CHAROS

# Mouse on so wheel scrolls tmux's buffer instead of falling through
# to whatever's running inside (which would scroll Claude Code's history).
set -g mouse on

# Bigger scrollback so we can actually walk back through TC's output.
set -g history-limit 100000

# Use vi keys in copy mode (Ctrl-B [, then arrows / hjkl / PgUp).
setw -g mode-keys vi

# Faster escape — claude/vim feel snappier.
set -sg escape-time 10
